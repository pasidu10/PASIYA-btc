name: Pasiya Crypto Signals

on:
  schedule:
    - cron: '*/30 * * * *' # විනාඩි 30කට සැරයක් Auto run වේ
  workflow_dispatch: # Manual run කරන්න බටන් එකක් ලබා දෙයි

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run Bot
        run: node index.js
